services:
  myfinance-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: myfinance-web
    env_file:
      - .env.docker
    ports:
      - "5010:5010"
    environment:
      FLASK_APP: MyFinance.finance
      FLASK_ENV: development
      FLASK_DEBUG: "True"
      FLASK_RUN_PORT: "5010"
      FLASK_HOST: 0.0.0.0
    extra_hosts:
      # Works on Docker Desktop (macOS/Windows) and Linux with recent Docker.
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5010/home', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

